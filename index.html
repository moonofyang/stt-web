<!DOCTYPE html>
<html>
<head>
  <base href="/stt-web/">
  <meta charset="UTF-8">
  <title>AI Realtime Speaker Diarization System</title>
  <style>
    body { background-color: #f3f4f6; }
  </style>
</head>
<body>
  <script>
    let audioContext = null;
    let analyser = null;
    let microphone = null;
    let javascriptNode = null;
    let recognition = null;
    let isMonitoring = false;

    // 1. 오디오 모니터링 시작 (Flutter에서 호출)
    window.startAudioMonitor = function() {
      if (isMonitoring) return;
      isMonitoring = true;

      navigator.mediaDevices.getUserMedia({ audio: true, video: false })
        .then(function(stream) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 256; 

          microphone = audioContext.createMediaStreamSource(stream);
          javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

          microphone.connect(analyser);
          analyser.connect(javascriptNode);
          javascriptNode.connect(audioContext.destination);

          javascriptNode.onaudioprocess = function() {
            if (!isMonitoring) return;
            let array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);

            let values = 0;
            let length = array.length;
            for (let i = 0; i < length; i++) {
              values += array[i];
            }

            let averageVolume = values / length; 

            // 플러터 Dart 내부 수신 스케일(volume > 50.0) 동기화
            if (window.onAudioVolumeSignal) {
              window.onAudioVolumeSignal(averageVolume * 10); 
            }
          };
        })
        .catch(function(err) {
          console.error("마이크 접근 에러:", err);
        });

      // 2. Web Speech API (STT) 엔진 구동
      if (!recognition) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognition = new SpeechRecognition();
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.lang = 'ko-KR';

          recognition.onresult = function(event) {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript;
              } else {
                interimTranscript += event.results[i][0].transcript;
              }
            }

            if (window.onWebSpeechResult) {
              if (finalTranscript.trim().length > 0) {
                window.onWebSpeechResult(finalTranscript, true);
              } else if (interimTranscript.trim().length > 0) {
                window.onWebSpeechResult(interimTranscript, false);
              }
            }
          };

          recognition.onerror = function(e) { console.log("STT 에러:", e); };
          recognition.onend = function() { if (isMonitoring && recognition) recognition.start(); };
        }
      }

      if (recognition) {
        try { recognition.start(); } catch(e) {}
      }
    };

    // 오디오 모니터링 중지 (Flutter에서 호출)
    window.stopAudioMonitor = function() {
      isMonitoring = false;
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      if (javascriptNode) { javascriptNode.disconnect(); javascriptNode = null; }
      if (microphone) { microphone.disconnect(); microphone = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
      if (window.onAudioVolumeSignal) window.onAudioVolumeSignal(0.0);
    };
  </script>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: "{{flutter_service_worker_version}}",
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
