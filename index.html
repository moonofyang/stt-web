<!DOCTYPE html>
<html>
<head>
  <base href="/stt-web/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AI Realtime Speaker Diarization System v3.0">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="STT Diarization">

  <title>AI 실시간 화자 분리 웹앱 v1.1</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background-color: #f3f4f6; padding: 0; margin: 0; }
  </style>
</head>
<body>
  <script>
    let audioContext = null;
    let analyser = null;
    let microphone = null;
    let javascriptNode = null;
    let recognition = null;
    let isMonitoring = false;
    let streamReference = null;

    // 실시간 오디오 모니터링 및 STT 시작
    window.startAudioMonitor = function() {
      if (isMonitoring) return;
      isMonitoring = true;

      // 1. 모바일/PC 마이크 미디어 장치 접근 인터페이스 통합 통합 표준화
      const constraints = { 
        audio: { 
          echoCancellation: true, 
          noiseSuppression: true, 
          autoGainControl: true 
        }, 
        video: false 
      };

      navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
          streamReference = stream;
          
          // 2. iOS/사파리 및 크롬 오디오 컨텍스트 호환성 레이어 크로스 브라우징
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          audioContext = new AudioContextClass();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 256; 

          microphone = audioContext.createMediaStreamSource(stream);
          
          // ScriptProcessor의 크로스 브라우저 바인딩
          const createScriptProcessor = audioContext.createScriptProcessor || audioContext.createJavaScriptNode;
          javascriptNode = createScriptProcessor.call(audioContext, 2048, 1, 1);

          microphone.connect(analyser);
          analyser.connect(javascriptNode);
          javascriptNode.connect(audioContext.destination);

          // 3. 모바일 브라우저의 오디오 잠금 강제 해제 (핵심)
          if (audioContext.state === 'suspended') {
            audioContext.resume();
          }

          javascriptNode.onaudioprocess = function() {
            if (!isMonitoring) return;
            let array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);

            let values = 0;
            let length = array.length;
            for (let i = 0; i < length; i++) {
              values += array[i];
            }

            // 플러터로 주파수/피치 볼륨 매칭 값 전달
            let averageVolume = values / length; 
            if (window.onAudioVolumeSignal) {
              window.onAudioVolumeSignal(averageVolume * 10); 
            }
          };
        })
        .catch(function(err) {
          console.error("마이크 접근 제한 또는 지원하지 않는 브라우저입니다:", err);
          alert("마이크 권한을 허용해 주세요 (HTTPS 환경 필수).");
        });

      // 4. Web Speech API 구동 (모바일 크롬/사파리 전용 래핑)
      if (!recognition) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognition = new SpeechRecognition();
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.lang = 'ko-KR';

          recognition.onresult = function(event) {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript;
              } else {
                interimTranscript += event.results[i][0].transcript;
              }
            }

            if (window.onWebSpeechResult) {
              if (finalTranscript.trim().length > 0) {
                window.onWebSpeechResult(finalTranscript, true);
              } else if (interimTranscript.trim().length > 0) {
                window.onWebSpeechResult(interimTranscript, false);
              }
            }
          };

          recognition.onerror = function(e) { 
            console.log("STT 오디오 스트림 인식 오류 상태:", e); 
          };
          
          recognition.onend = function() { 
            // 분석 상태가 켜져 있는 도중 모바일에서 STT가 끊기면 자동으로 재기동 시도
            if (isMonitoring && recognition) {
              try { recognition.start(); } catch(err) {}
            }
          };
        } else {
          alert("현재 브라우저는 실시간 웹 STT(SpeechRecognition)를 지원하지 않습니다. 크롬이나 사파리를 이용해 주세요.");
        }
      }

      if (recognition) {
        try { recognition.start(); } catch(e) {}
      }
    };

    // 모니터링 완전 안전 종료 및 하드웨어 자원 반환
    window.stopAudioMonitor = function() {
      isMonitoring = false;
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      if (javascriptNode) { javascriptNode.disconnect(); javascriptNode = null; }
      if (microphone) { microphone.disconnect(); microphone = null; }
      if (audioContext) { 
        audioContext.close(); 
        audioContext = null; 
      }
      if (streamReference) {
        streamReference.getTracks().forEach(track => track.stop());
        streamReference = null;
      }
      if (window.onAudioVolumeSignal) window.onAudioVolumeSignal(0.0);
    };
  </script>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: ""299483671"",
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
