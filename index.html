<!DOCTYPE html>
<html>
<head>
  <base href="/stt-web/">
  <meta charset="UTF-8">
  <title>AI Realtime Speaker Diarization System</title>
  <style>
    body { background-color: #f3f4f6; }
  </style>
</head>
<body>
  <script>
    let audioContext = null;
    let analyser = null;
    let microphone = null;
    let javascriptNode = null;
    let recognition = null;
    let isMonitoring = false;

    window.startAudioMonitor = function() {
      if (isMonitoring) return;
      isMonitoring = true;

      navigator.mediaDevices.getUserMedia({ audio: true, video: false })
        .then(function(stream) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 2048;

          microphone = audioContext.createMediaStreamSource(stream);
          javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

          microphone.connect(analyser);
          analyser.connect(javascriptNode);
          javascriptNode.connect(audioContext.destination);

          javascriptNode.onaudioprocess = function() {
            if (!isMonitoring) return;
            let array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);

            let values = 0;
            let length = array.length;
            let maxEnergy = 0;
            let maxIndex = 0;

            for (let i = 0; i < length; i++) {
              values += array[i];
              if (array[i] > maxEnergy) {
                maxEnergy = array[i];
                maxIndex = i;
              }
            }

            let averageVolume = values / length;
            let detectedPitch = maxEnergy > 30 ? maxIndex * (audioContext.sampleRate / analyser.fftSize) : 0;

            if (window.onAudioVolumeSignal) {
              window.onAudioVolumeSignal(detectedPitch > 0 ? detectedPitch : averageVolume * 3);
            }
          };
        })
        .catch(function(err) {
          console.error("마이크 접근 에러:", err);
        });

      if (!recognition) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognition = new SpeechRecognition();
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.lang = 'ko-KR';

          recognition.onresult = function(event) {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript;
              } else {
                interimTranscript += event.results[i][0].transcript;
              }
            }

            if (window.onWebSpeechResult) {
              if (finalTranscript.trim().length > 0) {
                window.onWebSpeechResult(finalTranscript, true);
              } else if (interimTranscript.trim().length > 0) {
                window.onWebSpeechResult(interimTranscript, false);
              }
            }
          };

          recognition.onerror = function(e) { console.log("STT 에러:", e); };
          recognition.onend = function() { if (isMonitoring && recognition) recognition.start(); };
        }
      }

      if (recognition) {
        try { recognition.start(); } catch(e) {}
      }
    };

    window.stopAudioMonitor = function() {
      isMonitoring = false;
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      if (javascriptNode) { javascriptNode.disconnect(); javascriptNode = null; }
      if (microphone) { microphone.disconnect(); microphone = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
      if (window.onAudioVolumeSignal) window.onAudioVolumeSignal(0.0);
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
